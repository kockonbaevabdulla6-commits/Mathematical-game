<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Киргиз математикалык суроолор</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .hint { color: gray; font-size: 0.8em; }
        .question { margin-bottom: 20px; }
        .correct { color: green; }
        .incorrect { color: red; }
    </style>
</head>
<body>
    <h1>Киргиз Математикалык Суроолор</h1>
    <div class="question">
        <p>1. 5 + 3?</p>
        <input type="text" id="answer1">
        <span class="hint">(Жооп: 8)</span>
    </div>
    <div class="question">
        <p>2. 10 - 4?</p>
        <input type="text" id="answer2">
        <span class="hint">(Жооп: 6)</span>
    </div>
    <div class="question">
        <p>3. 6 * 7?</p>
        <input type="text" id="answer3">
        <span class="hint">(Жооп: 42)</span>
    </div>
    <button onclick="checkAnswers()">Текшерүү</button>
    <div id="result"></div>
    <script>
        function checkAnswers() {
            const answers = [8, 6, 42];
            let correct = 0;
            for (let i = 0; i < answers.length; i++) {
                const userAnswer = document.getElementById(`answer${i + 1}`).value;
                if (parseInt(userAnswer) === answers[i]) {
                    correct++;
                    document.getElementById(`answer${i + 1}`).classList.add('correct');
                } else {
                    document.getElementById(`answer${i + 1}`).classList.add('incorrect');
                }
            }
            document.getElementById('result').innerText = `Сиздин жообуңуз: ${correct} из 3 туура.`;
        }
    </script>
</body>
</html>
